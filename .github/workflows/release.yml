name: Build & Release

on:
  release:
    types: [published]

jobs:
  release-mac:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Clean up unnecessary release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          for suffix in .blockmap latest-mac.yml; do
            for asset in $(gh release view "$tag" --json assets -q ".assets[].name | select(endswith(\"$suffix\"))"); do
              gh release delete-asset "$tag" "$asset" --yes || true
            done
          done
          for asset in $(gh release view "$tag" --json assets -q '.assets[].name | select(endswith(".zip"))'); do
            gh release delete-asset "$tag" "$asset" --yes || true
          done

  release-win:
    runs-on: windows-latest

    permissions:
      contents: write
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build unsigned Windows installer
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned
          path: dist/*.exe

      - name: Submit signing request to SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: easyclaw
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist/signed

      - name: Upload signed installer to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          for exe in dist/signed/*.exe; do
            gh release upload "$tag" "$exe" --clobber
          done

      - name: Clean up unnecessary release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          for suffix in .blockmap latest.yml; do
            for asset in $(gh release view "$tag" --json assets -q ".assets[].name | select(endswith(\"$suffix\"))"); do
              gh release delete-asset "$tag" "$asset" --yes || true
            done
          done
