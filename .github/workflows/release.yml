name: Build & Release

on:
  release:
    types: [published]

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
          - os: windows-latest
            build_cmd: npm run build:win

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Clean up unnecessary release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          for suffix in .blockmap latest.yml latest-mac.yml; do
            for asset in $(gh release view "$tag" --json assets -q ".assets[].name | select(endswith(\"$suffix\"))"); do
              gh release delete-asset "$tag" "$asset" --yes || true
            done
          done
          for asset in $(gh release view "$tag" --json assets -q '.assets[].name | select(endswith(".zip"))'); do
            gh release delete-asset "$tag" "$asset" --yes || true
          done
