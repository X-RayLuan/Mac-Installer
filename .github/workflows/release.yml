name: Build & Release

on:
  release:
    types: [published]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:mac-local
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:win-local

      - uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*-setup.exe

  publish:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish to easyclaw-releases
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          # 기존 릴리즈가 있으면 삭제 후 재생성
          gh release delete "$tag" --repo ybgwon96/easyclaw-releases --yes --cleanup-tag 2>/dev/null || true
          gh release create "$tag" \
            --repo ybgwon96/easyclaw-releases \
            --title "$tag" \
            --notes "https://easyclaw.kr" \
            artifacts/*
